services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: subscription
      POSTGRES_PASSWORD: subscription
      POSTGRES_DB: subscriptions
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U subscription -d subscriptions"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.3
    volumes:
      - ./migrations:/migrations
    command:
      - -path=/migrations
      - -database=postgres://subscription:subscription@postgres:5432/subscriptions?sslmode=disable
      - up
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://subscription:subscription@postgres:5432/subscriptions?sslmode=disable
      LOG_LEVEL: info
      MIGRATIONS_PATH: migrations
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
